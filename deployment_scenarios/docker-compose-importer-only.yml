# BIOMERO Importer-only deployment that connects to an existing external OMERO server
# Configure EXTERNAL_OMERO_HOST and related variables in .env file

version: "3"

services:
  database-biomero:
    image: "postgres:16"
    environment:
      POSTGRES_USER: ${BIOMERO_POSTGRES_USER}
      POSTGRES_DB: ${BIOMERO_POSTGRES_DB}
      POSTGRES_PASSWORD: ${BIOMERO_POSTGRES_PASSWORD}
    networks:
      - importer-network
    volumes:
      - "database-biomero:/var/lib/postgresql/data"

  omeroweb:
    image: "cellularimagingcf/omeroweb:${NL_BIOMERO_VERSION:-latest}"
    environment:
      OMEROHOST: ${EXTERNAL_OMERO_HOST}
      OMEROPORT: ${EXTERNAL_OMERO_PORT:-4064}
      CONFIG_omero_web_login__logo: "https://cembo.eu/wp-content/uploads/2021/04/Amsterdam-UMC.png"
      CONFIG_omero_scripts_timeout: ${OMERO_SCRIPTS_TIMEOUT}
      CONFIG_omero_web_session__expire__at__browser__close: "${OMERO_WEB_SESSION_EXPIRE_AT_BROWSER_CLOSE}"
      CONFIG_omero_web_session__cookie__age: ${OMERO_WEB_SESSION_COOKIE_AGE}
      ENV: ${OMERO_WEB_ENV}
      OMERO_BIOMERO_CONFIG_FILE: /opt/omero/web/OMERO.web/var/biomero-config.json
      INGEST_TRACKING_DB_URL: postgresql+psycopg2://${BIOMERO_POSTGRES_USER}:${BIOMERO_POSTGRES_PASSWORD}@database-biomero:5432/${BIOMERO_POSTGRES_DB}
      IMPORT_MOUNT_PATH: ${IMPORT_MOUNT_PATH}
      # External OMERO credentials
      ROOTPASS: ${EXTERNAL_OMERO_PASSWORD}
      IMPORTER_ENABLED: "TRUE"
      ANALYZER_ENABLED: "FALSE"
    networks:
      - importer-network
    ports:
      - "4080:4080"
    volumes:
      - "../web/slurm-config.ini:/opt/omero/web/OMERO.web/var/slurm-config.ini:rw"
      - "../web/biomero-config.json:/opt/omero/web/OMERO.web/var/biomero-config.json:rw"
      - "../web/L-Drive:/data:rw"

  metabase:
    image: metabase/metabase@sha256:f7b5dc52c21aaa2dca910a450e7e6119a975090ce9fc80726aa0742882ca176c
    container_name: metabase
    hostname: metabase
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
      MB_USER: ${METABASE_USER}
      MB_PASSWORD: ${METABASE_PASSWORD}
    networks:
      - importer-network
    ports:
      - "3000:3000"
    volumes:
      - "../metabase:/metabase-data"

  biomero-importer:
    image: "cellularimagingcf/biomero-importer:${BIOMERO_IMPORTER_VERSION:-latest}"
    privileged: true
    profiles:
      - "IMPORTER_ENABLED"
    devices:
      - "/dev/fuse:/dev/fuse"
    security_opt:
      - "label=disable"
    environment:
      OMERO_HOST: ${EXTERNAL_OMERO_HOST}
      OMERO_PORT: ${EXTERNAL_OMERO_PORT:-4064}
      OMERO_USER: ${EXTERNAL_OMERO_USER:-root}
      OMERO_PASSWORD: ${EXTERNAL_OMERO_PASSWORD}
      INGEST_TRACKING_DB_URL: postgresql+psycopg2://${BIOMERO_POSTGRES_USER}:${BIOMERO_POSTGRES_PASSWORD}@database-biomero:5432/${BIOMERO_POSTGRES_DB}
      ADI_RUN_MIGRATIONS: ${ADI_RUN_MIGRATIONS}
    networks:
      - importer-network
    volumes:
      - "../web/L-Drive:/data"
      - "../config/biomero-importer:/auto-importer/config:ro"
      - "../logs/biomero-importer:/auto-importer/logs"
    user: "${OMERO_CONTAINER_USER}"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

networks:
  importer-network:

volumes:
  database-biomero:
