# Parsers for different log formats
# These extract timestamp from log lines and normalize to: level, logger, pid, thread, message

# ============================================
# MULTILINE PARSERS
# These define what constitutes the START of a new log entry
# Any line not matching is appended to the previous entry
# ============================================

# OMERO/Biomeroworker format - lines starting with timestamp are new entries
# 2025-12-17 15:09:27,945 INFO  [logger] (thread) message
[MULTILINE_PARSER]
    Name          multiline_omero
    Type          regex
    Flush_timeout 1000
    # Lines starting with YYYY-MM-DD HH:MM:SS,mmm start a new entry
    Rule          "start_state"  "/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}/"  "cont"
    # Any other line is a continuation
    Rule          "cont"         "/^(?!\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})/"  "cont"

# Importer Python format - lines starting with timestamp-PID pattern
# 2025-12-03 13:53:24,424 - PID:16 - logger - INFO - message
[MULTILINE_PARSER]
    Name          multiline_importer
    Type          regex
    Flush_timeout 1000
    Rule          "start_state"  "/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}\s+-\s+PID:/"  "cont"
    Rule          "cont"         "/^(?!\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}\s+-\s+PID:)/"  "cont"

# OMERO CLI Java format - lines starting with timestamp + number
# 2025-12-03 14:26:29,900 500 [main] INFO logger - message
[MULTILINE_PARSER]
    Name          multiline_cli
    Type          regex
    Flush_timeout 1000
    Rule          "start_state"  "/^\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}\s+\d+/"  "cont"
    Rule          "cont"         "/^(?!\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3}\s+\d+)/"  "cont"

# ============================================
# REGULAR PARSERS - Extract fields from first line
# ============================================

# OMERO/Biomeroworker format:
# 2025-12-17 15:09:27,945 INFO  [ ome.services.blitz] [656] (MainThread) message
[PARSER]
    Name        omero_log
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}),\d{3}\s+(?<level>\w+)\s+\[(?<logger>[^\]]*)\]\s*(?:\[(?<pid>[^\]]*)\])?\s*\((?<thread>[^)]*)\)\s*(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   Off

# Importer Python format (app.logs):
# 2025-12-03 13:53:24,424 - PID:16 - __main__ - INFO - message
[PARSER]
    Name        importer_log
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}),\d{3}\s+-\s+PID:(?<pid>\d+)\s+-\s+(?<logger>[^\s]+)\s+-\s+(?<level>\w+)\s+-\s+(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   Off

# OMERO CLI Java format (cli.*.errs):
# 2025-12-03 14:26:29,900 500 [main] INFO ome.formats.importer.ImportConfig - message
[PARSER]
    Name        omero_cli_log
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}),\d{3}\s+\d+\s+\[\s*(?<thread>[^\]]*)\]\s+(?<level>\w+)\s+(?<logger>[^\s]+)\s+-\s+(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   Off

# OMERO Web format:
# 2025-12-03 13:56:20,018  INFO [omeroweb.webclient.views] (proc.00225) message
[PARSER]
    Name        omeroweb_log
    Format      regex
    Regex       ^(?<time>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}),\d{3}\s+(?<level>\w+)\s+\[(?<logger>[^\]]*)\]\s*\((?<thread>[^)]*)\)\s*(?<message>.*)$
    Time_Key    time
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   Off
