# Fluent Bit configuration for BIOMERO logging stack
# All services consolidated into one index with uniform schema:
# @timestamp, service, file, level, logger, pid, thread, message
#
# Uses multiline parsing to join stack traces into single entries

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  /fluent-bit/etc/parsers.conf

# ============================================
# INPUTS - Use multiline.parser for joining stack traces
# ============================================

# Biomeroworker .log files (Python OMERO format with multiline)
[INPUT]
    Name              tail
    Path              /logs/biomeroworker/*.log*
    Tag               biomero.worker.log
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/biomeroworker-log.db
    Path_Key          file
    multiline.parser  multiline_omero

# Biomeroworker .err files (raw stderr - no multiline needed, single lines)
[INPUT]
    Name              tail
    Path              /logs/biomeroworker/*.err
    Tag               biomero.worker.err
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/biomeroworker-err.db
    Path_Key          file

# Importer Python logs (app.logs with multiline)
[INPUT]
    Name              tail
    Path              /logs/biomero-importer/app.logs
    Tag               biomero.importer.log
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/importer-app.db
    Path_Key          file
    multiline.parser  multiline_importer

# Importer CLI .errs files (Java OMERO format with multiline for stack traces)
[INPUT]
    Name              tail
    Path              /logs/biomero-importer/cli.*.errs
    Tag               biomero.importer-cli.log
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/importer-cli-errs.db
    Path_Key          file
    multiline.parser  multiline_cli

# OMERO Server .log files (with multiline for stack traces)
[INPUT]
    Name              tail
    Path              /logs/omeroserver/*.log*
    Tag               biomero.omeroserver.log
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/omeroserver-log.db
    Path_Key          file
    multiline.parser  multiline_omero

# OMERO Server .err files (raw stderr)
[INPUT]
    Name              tail
    Path              /logs/omeroserver/*.err
    Tag               biomero.omeroserver.err
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/omeroserver-err.db
    Path_Key          file

# OMERO Worker .log files (with multiline)
[INPUT]
    Name              tail
    Path              /logs/omeroworker-1/*.log*
    Tag               biomero.omeroworker1.log
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/omeroworker1-log.db
    Path_Key          file
    multiline.parser  multiline_omero

# OMERO Worker .err files (raw stderr)
[INPUT]
    Name              tail
    Path              /logs/omeroworker-1/*.err
    Tag               biomero.omeroworker1.err
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/omeroworker1-err.db
    Path_Key          file

# OMERO Web logs (with multiline)
[INPUT]
    Name              tail
    Path              /logs/omeroweb/*
    Tag               biomero.omeroweb.log
    Refresh_Interval  5
    Read_from_Head    True
    Buffer_Max_Size   1M
    DB                /fluent-bit/db/omeroweb.db
    Path_Key          file
    multiline.parser  multiline_omero

# ============================================
# FILTERS - Parse the multiline records
# After multiline joins, we need to parse the first line for fields
# ============================================

# Parse biomeroworker logs
[FILTER]
    Name          parser
    Match         biomero.worker.log
    Key_Name      log
    Parser        omero_log
    Reserve_Data  On
    Preserve_Key  On

# Parse importer logs
[FILTER]
    Name          parser
    Match         biomero.importer.log
    Key_Name      log
    Parser        importer_log
    Reserve_Data  On
    Preserve_Key  On

# Parse importer CLI logs
[FILTER]
    Name          parser
    Match         biomero.importer-cli.log
    Key_Name      log
    Parser        omero_cli_log
    Reserve_Data  On
    Preserve_Key  On

# Parse omeroserver logs
[FILTER]
    Name          parser
    Match         biomero.omeroserver.log
    Key_Name      log
    Parser        omero_log
    Reserve_Data  On
    Preserve_Key  On

# Parse omeroworker logs
[FILTER]
    Name          parser
    Match         biomero.omeroworker1.log
    Key_Name      log
    Parser        omero_log
    Reserve_Data  On
    Preserve_Key  On

# Parse omeroweb logs
[FILTER]
    Name          parser
    Match         biomero.omeroweb.log
    Key_Name      log
    Parser        omeroweb_log
    Reserve_Data  On
    Preserve_Key  On

# ============================================
# FILTERS - Add service labels
# ============================================

[FILTER]
    Name         record_modifier
    Match        biomero.worker.*
    Record       service biomeroworker
    Record       job biomero

[FILTER]
    Name         record_modifier
    Match        biomero.importer.log
    Record       service importer
    Record       job biomero

[FILTER]
    Name         record_modifier
    Match        biomero.importer-cli.*
    Record       service importer-cli
    Record       job biomero

[FILTER]
    Name         record_modifier
    Match        biomero.omeroserver.*
    Record       service omeroserver
    Record       job biomero

[FILTER]
    Name         record_modifier
    Match        biomero.omeroworker1.*
    Record       service omeroworker-1
    Record       job biomero

[FILTER]
    Name         record_modifier
    Match        biomero.omeroweb.*
    Record       service omeroweb
    Record       job biomero

# ============================================
# FILTERS - Normalize records (level, file, message)
# ============================================

[FILTER]
    Name          lua
    Match         biomero.*
    Script        /fluent-bit/etc/normalize.lua
    Call          normalize_record

# ============================================
# OUTPUT - Send to OpenSearch
# ============================================

[OUTPUT]
    Name            opensearch
    Match           *
    Host            opensearch
    Port            9200
    Index           biomero-logs
    Suppress_Type_Name On
    Buffer_Size     5M
    Generate_ID     On
    Workers         1
